# ─── PROMETHEUS ────────────────────────────────────────────────────────────
prometheus:
  prometheusSpec:
    retention: 15d
    scrapeInterval: 5s
    # Use memory storage for dev — no PVC needed
    storageSpec: {}

# ─── GRAFANA ───────────────────────────────────────────────────────────────
grafana:
  adminPassword: "pitwall-admin"
  # Disable persistence for dev
  persistence:
    enabled: false
  service:
    type: ClusterIP
  additionalDataSources:
    - name: Loki
      type: loki
      url: http://loki.observability.svc.cluster.local:3100
      access: proxy

# ─── ALERTMANAGER ──────────────────────────────────────────────────────────
alertmanager:
  alertmanagerSpec:
    # Disable persistence for dev
    storage: {}

# ─── NODE EXPORTER ─────────────────────────────────────────────────────────
nodeExporter:
  enabled: true

# ─── KUBE STATE METRICS ────────────────────────────────────────────────────
kubeStateMetrics:
  enabled: true